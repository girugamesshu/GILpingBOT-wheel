<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER ROULETTE</title>
    <!-- Telegram WebApp API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background grid -->
    <div class="cyber-grid"></div>

    <div class="container">
        <h1 id="title" class="glitch-text" data-text="CYBER ROULETTE">CYBER ROULETTE</h1>
        
        <div class="wheel-outer-ring">
            <div class="wheel-container">
                <canvas id="wheelCanvas" width="360" height="360"></canvas>
                <div class="pointer"></div>
            </div>
        </div>
        
        <div id="resultModal" class="hidden">
            <div class="modal-content cyber-panel">
                <div class="scanline"></div>
                <div class="icon">⚠️</div>
                <div class="result-label">MATCH FOUND:</div>
                <h2 id="resultText" class="glitch-text winner" data-text=""></h2>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
